syncSource:
  replicaSet:
    hostAndPort: "rs0-1:27017"
    username: mongotUser
    passwordFile: /mongot-community/pwfile
    authSource: admin
    tls: false
    readPreference: primaryPreferred
storage:
  dataPath: "data/mongot"
server:
  grpc:
    address: "search-mongot:27028"
    tls:
      mode: "disabled"
metrics:
  enabled: true
  address: "search-mongot:9946"
healthCheck:
  address: "search-mongot:8080"
logging:
  verbosity: INFO
